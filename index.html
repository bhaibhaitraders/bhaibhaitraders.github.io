<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Portal</title>

  <link rel="icon" href="logo.png">

  <style>
    @font-face {
      font-family: 'SutonnyOMJ';
      src: url('font/SutonnyOMJ.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body.bn-font * {
      font-family: 'SutonnyOMJ', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      color: #333;
      padding: 40px 15px;
      overflow-x: hidden;
    }

    #langOverlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.95);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(10px);
      transition: opacity 0.5s ease;
    }

    .lang-card {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .lang-card h2 {
      border: none;
      margin: 0 0 25px;
      font-size: 1.2rem;
      letter-spacing: 0.5px;
    }

    .lang-btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid #3498db;
      background: #fff;
      color: #3498db;
      transition: all 0.3s ease;
    }

    .lang-btn:hover {
      background: #3498db;
      color: #fff;
      transform: translateY(-2px);
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      width: 100%;
      padding: 30px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(20px);
      transition: opacity 1s ease, transform 0.6s ease;
    }

    .container.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      font-size: 1.8rem;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: #7f8c8d;
      font-size: 0.9rem;
      margin-bottom: 30px;
    }

    h2 {
      font-size: 0.85rem;
      color: #34495e;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin: 30px 0 12px;
      border-bottom: 1px solid #eee;
      padding-bottom: 5px;
    }

    .info-card {
      background: #fdfdfd;
      border: 1px solid #f0f0f0;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 15px;
      transition: 0.3s ease;
    }

    .info-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08);
    }

    .bank-header {
      color: #3498db;
      font-weight: bold;
      font-size: 1.1rem;
      margin-bottom: 12px;
      display: block;
    }

    .bank-grid {
      display: grid;
      grid-template-columns: 115px 1fr;
      gap: 8px 5px;
      font-size: 0.9rem;
      align-items: start;
    }

    .label {
      color: #7f8c8d;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-right: 10px;
      white-space: nowrap;
    }

    .value {
      color: #2c3e50;
      font-weight: 600;
      word-break: break-all;
      line-height: 1.2;
    }

    .acc-highlight {
      color: #3498db;
      font-family: 'Consolas', monospace;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    .btn {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-top: 8px;
      cursor: pointer;
      border: none;
      transition: 0.2s;
    }

    /* Updated call now button color to match copy buttons */
    .btn-primary {
      background: #f1f2f6;
      color: #57606f;
    }

    .btn-secondary {
      background: #f1f2f6;
      color: #57606f;
    }

    .btn-toggle {
      background: #dcdde1;
      color: #2f3640;
      margin-top: 5px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .datetime {
      margin-top: 30px;
      text-align: center;
      font-size: 0.8rem;
      color: #95a5a6;
      border-top: 1px solid #f0f0f0;
      padding-top: 20px;
    }

    /* Responsive Design Optimization */
    @media (max-width: 600px) {
      .container {
        padding: 20px 15px;
      }

      h1 {
        font-size: 1.5rem;
      }

      h2 {
        font-size: 0.8rem;
        margin: 25px 0 10px;
      }

      .bank-grid {
        grid-template-columns: 1fr;
        gap: 5px;
      }

      .label {
        font-size: 0.7rem;
        padding-right: 0;
        justify-content: flex-start;
        margin-top: 5px;
      }

      .label span {
        display: none;
      }

      .value {
        padding-left: 5px;
        margin-bottom: 5px;
      }

      .acc-highlight {
        font-size: 0.95rem;
      }

      .btn {
        font-size: 0.8rem;
        padding: 8px;
        margin-top: 6px;
      }
    }

    @media (min-width: 601px) and (max-width: 1024px) {
      .container {
        max-width: 600px;
      }
    }
  </style>
</head>

<body>
  <!-- Language Selection Overlay -->
  <div id="langOverlay">
    <div class="lang-card">
      <h2>Select Your Language</h2>
      <button class="lang-btn" onclick="setLang('en')">English</button>
      <button class="lang-btn" onclick="setLang('bn')">Bengali</button>
    </div>
  </div>

  <div class="container" id="mainContainer">
    <h1 data-key="title">M/S Bhai Bhai Traders</h1>
    <p class="subtitle" data-key="subtitle">Official Business Portal</p>

    <h2 data-key="shopContact">Shop Contacts</h2>
    <div id="contactList"></div>

    <h2 data-key="bankInfo">BANK Information</h2>
    <div id="bankList"></div>

    <h2 data-key="cardInfo">CARD Information</h2>
    <div id="cardList"></div>

    <h2 data-key="generalInfo">General Info</h2>
    <div id="generalList"></div>

    <div class="datetime" id="datetime"></div>
  </div>

  <script>
    const translations = {
      en: {
        title: "M/S Bhai Bhai Traders",
        subtitle: "Official Business Portal",
        shopContact: "Shop Contacts",
        bankInfo: "BANK Information",
        cardInfo: "CARD Information",
        generalInfo: "General Info",
        callNow: "📞 Call Now",
        copyAcc: "Copy Account Number",
        copyCard: "Copy Card Number",
        show: "Show",
        hide: "Hide",
        copied: "Copied!",
        rights: "M/S Bhai Bhai Traders. All rights reserved."
      },
      bn: {
        title: "মেসার্স ভাই ভাই ট্রেডার্স",
        subtitle: "অফিসিয়াল বিজনেস পোর্টাল",
        shopContact: "যোগাযোগের ঠিকানা",
        bankInfo: "ব্যাংকের তথ্য",
        cardInfo: "কার্ডের তথ্য",
        generalInfo: "অন্যান্য তথ্য",
        callNow: "📞 কল করুন",
        copyAcc: "অ্যাকাউন্ট নম্বর কপি করুন",
        copyCard: "কার্ড নম্বর কপি করুন",
        show: "দেখুন",
        hide: "লুকান",
        copied: "কপি করা হয়েছে!",
        rights: "মেসার্স ভাই ভাই ট্রেডার্স - সর্বস্বত্ব সংরক্ষিত।"
      }
    };

    let currentLang = 'en';

    const myContacts = [
      {
        en: { name: "MD. ABUL KALAM AZAD (LABU)", role: "Proprietor" },
        bn: { name: "প্রোঃ মোঃ আবুল কালাম আজাদ (লেবু)", role: "স্বত্বাধিকারী" },
        phone: "+8801736780197"
      },
      {
        en: { name: "TANVIR HASAN (NIJHOM)", role: "Managing Director" },
        bn: { name: "তানভীর হাসান (নিঝুম)", role: "ব্যবস্থাপনা পরিচালক" },
        phone: "+8801735404034"
      }
    ];

    const myBanks = [
      { bank: "BRAC Bank PLC (1)", name: "M/S BHAI BHAI TRADERS", acc: "0000000000", branch: "PLACEHOLDER", routing: "", swift: "PLACEHOLDER" },
      { bank: "BRAC Bank PLC (2)", name: "TANVIR HASAN", acc: "1057305720001", branch: "TANGAIL BRANCH", routing: "060932305", swift: "BRAKBDDH" },
      { bank: "City Bank PLC", name: "M/S BHAI BHAI TRADERS", acc: "1503353045001", branch: "GHATAIL SUB BRANCH", routing: "", swift: "CIBLBDDH" }
    ];

    const myCards = [
      { bank: "VISA (1)", card: "4777920800060917", type: "Debit", network: "Visa" },
      { bank: "VISA (2)", card: "0000000000", type: "Debit", network: "Visa" },
      { bank: "American Express", card: "371599122322771", type: "Debit", network: "American Express" }
    ];

    function formatAccount(acc) {
      const first = acc.slice(0, 4);
      const last = acc.slice(-4);
      return `${first}-****-${last}`;
    }

    const generalInfo = [
      {
        en: { type: "Email", value: "info@bhaibhaitraders.com", label: "Send Email" },
        bn: { type: "ইমেইল", value: "info@bhaibhaitraders.com", label: "ইমেইল পাঠান" },
        action: "mailto:info@bhaibhaitraders.com"
      },
      {
        en: { type: "Address", value: "Raktipara Bus Stand, Madhupur, Tangail", label: "View on Google Maps" },
        bn: { type: "ঠিকানা", value: "রক্তিপাড়া বাসস্ট্যান্ড, মধুপুর, টাঙ্গাইল", label: "গুগল ম্যাপে দেখুন" },
        action: "https://maps.app.goo.gl/XDMBKiriLQUUtSB86"
      }
    ];

    function setLang(lang) {
      currentLang = lang;

      if (lang === 'bn') {
        document.body.classList.add('bn-font');
      } else {
        document.body.classList.remove('bn-font');
      }

      // Update static text
      document.querySelectorAll("[data-key]").forEach(elem => {
        const key = elem.getAttribute("data-key");
        if (translations[lang][key]) {
          elem.textContent = translations[lang][key];
        }
      });

      renderContent();

      // Hide overlay and show main container
      const overlay = document.getElementById('langOverlay');
      overlay.style.opacity = '0';
      setTimeout(() => {
        overlay.style.display = 'none';
        document.getElementById('mainContainer').classList.add('show');
      }, 500);
    }

    function renderContent() {
      const t = translations[currentLang];

      // Contacts
      document.getElementById('contactList').innerHTML = myContacts.map(c => `
        <div class="info-card">
          <span class="bank-header">${c[currentLang].name}</span>
          <div style="color:#888; font-size:0.85rem; margin-top:-8px; margin-bottom:10px;">${c[currentLang].role}</div>
          <a href="tel:${c.phone}" class="btn btn-primary">${t.callNow}</a>
        </div>
      `).join('');

      // Banks (Data stays intact, just buttons translate)
      document.getElementById('bankList').innerHTML = myBanks.map((b, index) => {
        const isVisible = accVisible[index];
        const btnText = isVisible ? t.hide : t.show;
        const displayAcc = isVisible ? b.acc : formatAccount(b.acc);
        return `
        <div class="info-card">
          <span class="bank-header">${b.bank}</span>
          <div class="bank-grid">
            <div class="label">A/C NAME <span>:</span></div><div class="value">${b.name}</div>
            <div class="label">A/C NO <span>:</span></div>
            <div class="value acc-highlight" id="acc-${index}">${displayAcc}</div>
            <div class="label">BRANCH <span>:</span></div><div class="value">${b.branch}</div>
          </div>
          <button class="btn btn-toggle" id="toggle-acc-${index}" onclick="toggleAcc(${index}, '${b.acc}')">${btnText}</button>
          <button class="btn btn-secondary" onclick="copyAcc('${b.acc}')">${t.copyAcc}</button>
        </div>
      `}).join('');

      // Cards (Data stays intact, just buttons translate)
      document.getElementById('cardList').innerHTML = myCards.map((c, index) => {
        const isVisible = cardVisible[index];
        const btnText = isVisible ? t.hide : t.show;
        const displayCard = isVisible ? c.card : formatAccount(c.card);
        return `
        <div class="info-card">
          <span class="bank-header">${c.bank}</span>
          <div class="bank-grid">
            <div class="label">CARD NO <span>:</span></div><div class="value acc-highlight" id="card-${index}">${displayCard}</div>
            <div class="label">TYPE <span>:</span></div><div class="value">${c.type}</div>
            <div class="label">NETWORK <span>:</span></div><div class="value">${c.network}</div>
          </div>
          <button class="btn btn-toggle" id="toggle-card-${index}" onclick="toggleCard(${index}, '${c.card}')">${btnText}</button>
          <button class="btn btn-secondary" onclick="copyAcc('${c.card}')">${t.copyCard}</button>
        </div>
      `}).join('');

      // General Info
      document.getElementById('generalList').innerHTML = generalInfo.map(g => `
        <div class="info-card">
          <span class="bank-header" style="color:#333; font-size:1rem;">${g[currentLang].type}</span>
          <div style="color:#666; font-size:0.85rem; margin-top:-5px; margin-bottom:10px;">${g[currentLang].value}</div>
          <a href="${g.action}" target="_blank" class="btn btn-secondary">${g[currentLang].label}</a>
        </div>
      `).join('');

      updateTime();
    }

    const datetime = document.getElementById('datetime');
    function updateTime() {
      const now = new Date();
      // Adjust locale based on language
      const locale = currentLang === 'bn' ? 'bn-BD' : 'en-US';
      const formatted = now.toLocaleString(locale, {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
      const year = now.getFullYear();

      // Convert year to bengali numbers if needed
      const displayYear = currentLang === 'bn' ? new Intl.NumberFormat('bn-BD', { useGrouping: false }).format(year) : year;

      datetime.innerHTML = `${formatted}<br>© ${displayYear} ${translations[currentLang].rights}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Setup time updater
      setInterval(updateTime, 1000);

      // If no language chosen yet, wait for user
      // Elements are hidden by default via CSS container not having "show" class
    });

    function copyAcc(text) {
      navigator.clipboard.writeText(text).then(() => showToast(translations[currentLang].copied));
    }

    function showToast(message) {
      const toast = document.createElement("div");
      toast.textContent = message;
      toast.style.position = "fixed";
      toast.style.bottom = "20px";
      toast.style.left = "50%";
      toast.style.transform = "translateX(-50%)";
      toast.style.background = "#2c3e50";
      toast.style.color = "#fff";
      toast.style.padding = "10px 20px";
      toast.style.borderRadius = "6px";
      toast.style.fontSize = "0.85rem";
      toast.style.boxShadow = "0 5px 15px rgba(0,0,0,0.2)";
      toast.style.zIndex = "9999";
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    const accVisible = {};
    function toggleAcc(index, fullAcc) {
      const elem = document.getElementById(`acc-${index}`);
      const btn = document.getElementById(`toggle-acc-${index}`);
      const t = translations[currentLang];
      if (accVisible[index]) {
        elem.textContent = formatAccount(fullAcc);
        btn.textContent = t.show;
        accVisible[index] = false;
      } else {
        elem.textContent = fullAcc;
        btn.textContent = t.hide;
        accVisible[index] = true;
      }
    }

    const cardVisible = {};
    function toggleCard(index, fullCard) {
      const elem = document.getElementById(`card-${index}`);
      const btn = document.getElementById(`toggle-card-${index}`);
      const t = translations[currentLang];
      if (cardVisible[index]) {
        elem.textContent = formatAccount(fullCard);
        btn.textContent = t.show;
        cardVisible[index] = false;
      } else {
        elem.textContent = fullCard;
        btn.textContent = t.hide;
        cardVisible[index] = true;
      }
    }
  </script>

</body>

</html>
