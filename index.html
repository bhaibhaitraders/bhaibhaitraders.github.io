<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Portal</title>

  <link rel="icon" href="bin/images/favicon/favicon.png">

  <style>
    @font-face {
      font-family: 'SutonnyOMJ';
      src: url('bin/font/SutonnyOMJ.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'Lemon Milk';
      src: url('bin/font/lemon-milk.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'Times New Roman';
      src: url('bin/font/times-new-roman.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Times New Roman', Times, serif;
    }

    body.bn-font * {
      font-family: 'SutonnyOMJ', 'Times New Roman', serif;
      line-height: 1.6;
    }

    /* Bengali-specific spacing fixes */
    body.bn-font h1 {
      margin-bottom: 10px;
    }

    body.bn-font .subtitle {
      margin-bottom: 35px;
    }

    body.bn-font .bank-header {
      margin-bottom: 8px;
    }

    body.bn-font .info-card {
      padding: 20px 18px;
    }

    body.bn-font .datetime {
      line-height: 2.2;
      padding-top: 22px;
    }

    .bn-text {
      font-family: 'SutonnyOMJ', 'Times New Roman', serif !important;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      color: #333;
      padding: 40px 15px;
      overflow-x: hidden;
    }

    #langOverlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.95);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      backdrop-filter: blur(10px);
      transition: opacity 0.5s ease;
      overflow-y: auto;
      padding: 20px 0;
    }

    .lang-logo {
      width: 220px;
      height: auto;
      object-fit: contain;
      margin-bottom: 20px;
      animation: logoFadeIn 1s ease;
    }

    @keyframes logoFadeIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .lang-card {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 400px;
      width: 90%;
      margin: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .lang-card h2 {
      font-family: 'Lemon Milk', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      border: none;
      margin: 0 0 25px;
      font-size: 1.2rem;
      letter-spacing: 0.5px;
    }

    .lang-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 55px;
      margin-bottom: 15px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid #3498db;
      background: #fff;
      color: #3498db;
      padding: 0 14px;
      transition: all 0.3s ease;
    }

    .lang-btn:hover {
      background: #3498db;
      color: #fff;
      transform: translateY(-2px);
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      width: 100%;
      padding: 30px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(20px);
      transition: opacity 1s ease, transform 0.6s ease;
    }

    .container.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    h1 {
      font-family: 'Lemon Milk', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      color: #2c3e50;
      font-size: 1.8rem;
      margin-bottom: 5px;
    }

    .subtitle {
      font-family: 'Lemon Milk', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      color: #7f8c8d;
      font-size: 0.9rem;
      margin-bottom: 30px;
      font-weight: bold;
      line-height: 1.5;
      word-wrap: break-word;
      overflow-wrap: break-word;
      padding: 0 5px;
    }

    h2 {
      font-size: 0.85rem;
      color: #34495e;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin: 30px 0 12px;
      border-bottom: 1px solid #eee;
      padding-bottom: 5px;
    }

    .info-card {
      background: #fdfdfd;
      border: 1px solid #f0f0f0;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 15px;
      transition: 0.3s ease;
    }

    .info-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08);
    }

    .accordion-header {
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
      opacity: 0;
    }

    .accordion-content.open {
      max-height: 1000px;
      opacity: 1;
      margin-top: 15px;
      padding-bottom: 2px;
    }

    .chevron {
      transition: transform 0.3s ease;
      color: #7f8c8d;
    }

    .chevron.rotate {
      transform: rotate(180deg);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .bank-header {
      color: #3498db;
      font-weight: bold;
      font-size: 1.1rem;
      margin-bottom: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .contact-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 12px;
    }

    .contact-img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #f0f0f0;
    }

    .card-icon {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .contact-role {
      color: #7f8c8d;
      font-size: 0.9rem;
      margin-top: 5px;
      margin-bottom: 12px;
      font-weight: 500;
      display: block;
    }

    .copy-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      color: #7f8c8d;
      padding: 5px;
      border-radius: 4px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    .copy-btn:hover {
      background: #f1f2f6;
      color: #3498db;
    }

    .copy-btn svg {
      width: 18px;
      height: 18px;
    }

    .info-card.is-open .copy-btn {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
    }

    .bank-grid {
      display: grid;
      grid-template-columns: 115px 1fr;
      gap: 8px 5px;
      font-size: 0.9rem;
      align-items: start;
    }

    .label {
      color: #7f8c8d;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-right: 10px;
      white-space: nowrap;
    }

    .value {
      color: #2c3e50;
      font-weight: 600;
      word-break: break-all;
      line-height: 1.2;
    }

    .acc-highlight {
      color: #3498db;
      font-family: 'Consolas', monospace;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    .btn {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-top: 8px;
      cursor: pointer;
      border: none;
      transition: 0.2s;
    }

    /* Updated call now button color to match copy buttons */
    .btn-primary {
      background: #f1f2f6;
      color: #57606f;
    }

    .btn-secondary {
      background: #f1f2f6;
      color: #57606f;
    }

    .btn-toggle {
      background: #dcdde1;
      color: #2f3640;
      margin-top: 5px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .datetime {
      margin-top: 30px;
      text-align: center;
      font-size: 0.8rem;
      color: #95a5a6;
      border-top: 1px solid #f0f0f0;
      padding-top: 20px;
    }

    /* Responsive Design Optimization */
    @media (max-width: 768px) {
      .subtitle {
        max-width: 75%;
        margin-left: auto;
        margin-right: auto;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px 15px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .subtitle {
        font-size: 0.78rem;
        padding: 0 3px;
      }

      h2 {
        font-size: 0.8rem;
        margin: 25px 0 10px;
      }

      .bank-grid {
        grid-template-columns: 1fr;
        gap: 5px;
      }

      .label {
        font-size: 0.7rem;
        padding-right: 0;
        justify-content: flex-start;
        margin-top: 5px;
      }

      .label span {
        display: none;
      }

      .value {
        padding-left: 5px;
        margin-bottom: 5px;
      }

      .acc-highlight {
        font-size: 0.95rem;
      }

      .btn {
        font-size: 0.8rem;
        padding: 8px;
        margin-top: 6px;
      }
    }

    @media (max-width: 380px) {
      .subtitle {
        font-size: 0.72rem;
        padding: 0 2px;
      }

      h1 {
        font-size: 1.3rem;
      }
    }

    @media (min-width: 601px) and (max-width: 1024px) {
      .container {
        max-width: 600px;
      }
    }

    /* Focus Mode for Shared Links */
    body.blur-active {
      overflow: hidden;
      height: 100vh;
    }

    body.blur-active .container>h1,
    body.blur-active .container>.subtitle,
    body.blur-active .container>h2,
    body.blur-active .container>.datetime,
    body.blur-active .info-card:not(.highlighted-item) {
      filter: blur(5px);
      opacity: 0.4;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      transition: all 0.4s ease;
    }

    .info-card.highlighted-item {
      transform: scale(1.02);
      box-shadow: 0 15px 35px rgba(52, 152, 219, 0.2);
      border-color: #3498db;
      z-index: 10;
      position: relative;
    }

    .info-card.highlighted-item .chevron,
    .info-card.highlighted-item .copy-btn[title="Copy Link"],
    .info-card.highlighted-item .copy-btn[title="লিঙ্ক কপি করুন"] {
      display: none !important;
    }

    #clearFocusBtn {
      display: none;
      position: absolute;
      top: -15px;
      left: -15px;
      z-index: 10001;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: #2c3e50;
      color: white;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      border: 2px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    #clearFocusBtn:hover {
      background: #f1f2f6;
      color: #2c3e50;
      transform: scale(1.05);
    }

    /* Focus mode: landscape phone fix — prevent edge clipping */
    @media (max-height: 500px) and (orientation: landscape) {
      .info-card.highlighted-item {
        transform: none;
      }
    }

    /* ── Floating Language Toggle Button ── */
    #langToggleBtn {
      position: fixed;
      bottom: 25px;
      left: 25px;
      z-index: 9998;
      display: none;
      /* shown via JS after first language pick */
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: rgba(44, 62, 80, 0.9);
      backdrop-filter: blur(5px);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      white-space: nowrap;
      user-select: none;
    }

    #langToggleBtn:hover {
      background: #3498db;
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
    }

    #langToggleBtn:active {
      transform: scale(0.95);
    }

    /* Globe icon inside the button */
    #langToggleBtn svg {
      flex-shrink: 0;
    }

    /* Hide in focus/blur mode */
    body.blur-active #langToggleBtn {
      display: none !important;
    }

    /* Mobile: slightly smaller */
    @media (max-width: 400px) {
      #langToggleBtn {
        width: 42px;
        height: 42px;
        font-size: 0.8rem;
        bottom: 20px;
        left: 20px;
      }
    }
  </style>
</head>

    function formatAccount(acc) {
      const first = acc.slice(0, 4);
      const last = acc.slice(-4);
      return `${first}-****-${last}`;
    }

    function displayHyphens(text) {
      if (!text || text.length <= 8) return text;

      const len = text.length;
      const first = text.slice(0, 4);
      const last = text.slice(-4);
      const mid = text.slice(4, -4);

      if (len === 13) {
        // 13-digit special case: 4-5-4
        return `${first}-${mid}-${last}`;
      }

      // General case: group mid in blocks of up to 4
      const midGrouped = mid.match(/.{1,4}/g).join('-');
      return `${first}-${midGrouped}-${last}`;
    }

    const copyIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>`;
    const checkIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    const shareLinkIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>`;

    let highlightedItemId = null;
    const openAccordions = new Set();

    /* Whether the initial language has been chosen yet */
    let langInitialised = false;

    function setLang(lang, fromToggle) {
      currentLang = lang;

      if (lang === 'bn') {
        document.body.classList.add('bn-font');
      } else {
        document.body.classList.remove('bn-font');
      }

      // Update static text
      document.querySelectorAll("[data-key]").forEach(elem => {
        const key = elem.getAttribute("data-key");
        if (translations[lang][key]) {
          elem.textContent = translations[lang][key];
        }
      });

      // Update the toggle button label to show the OTHER language
      const toggleLabel = document.getElementById('langToggleLabel');
      if (toggleLabel) {
        toggleLabel.textContent = lang === 'en' ? 'BN' : 'EN';
      }

      renderContent();

      if (!langInitialised) {
        // ── First-time pick: hide overlay & reveal main content ──
        langInitialised = true;
        const overlay = document.getElementById('langOverlay');
        overlay.style.opacity = '0';
        setTimeout(() => {
          overlay.style.display = 'none';
          document.getElementById('mainContainer').classList.add('show');

          // Show the language toggle button
          const toggleBtn = document.getElementById('langToggleBtn');
          if (toggleBtn) toggleBtn.style.display = 'flex';

          if (highlightedItemId) {
            const target = document.getElementById('item-' + highlightedItemId);
            if (target) {
              const clearBtn = document.getElementById('clearFocusBtn');
              if (clearBtn) {
                target.appendChild(clearBtn);
                clearBtn.style.display = 'flex';
              }
              target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          }
        }, 500);
      }
      // If called from the toggle button, content is already visible — nothing else to do.
    }

    function toggleLang() {
      setLang(currentLang === 'en' ? 'bn' : 'en', true);
    }

    function renderContent() {
      const t = translations[currentLang];

      // Contacts
      document.getElementById('contactList').innerHTML = myContacts.map(c => `
        <div class="info-card">
          <div class="contact-header">
            <img src="${c.img}" alt="${c[currentLang].name}" class="contact-img">
            <div class="contact-info">
              <span class="bank-header" style="gap: 0;">${c[currentLang].name}</span>
              <div class="contact-role" style="margin-bottom: 0;">${c[currentLang].role}</div>
            </div>
          </div>
          <a href="tel:${c.phone}" class="btn btn-primary">${t.callNow}</a>
        </div>
      `).join('');

      // Banks (Data stays intact, just buttons translate)
      document.getElementById('bankList').innerHTML = myBanks.map((b, index) => {
        const itemId = `item-bank-${index}`;
        const isVisible = accVisible[index];
        const btnText = isVisible ? t.hide : t.show;
        const displayAcc = isVisible ? b.acc : formatAccount(b.acc);
        const isHighlighted = highlightedItemId === 'bank-' + index;
        const isOpen = openAccordions.has(itemId) || isHighlighted;

        return `
        <div class="info-card ${isOpen ? 'highlighted-item is-open' : ''}" id="${itemId}">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <div class="card-header" style="margin-bottom: 0; flex: 1;">
              <span class="bank-header">
                <img src="${b.img}" alt="${b.bank}" class="card-icon">
                ${b.bank}
              </span>
              <div style="display: flex; gap: 4px;">
                <button class="copy-btn" onclick="event.stopPropagation(); shareSpecificLink('bank', ${index}, this)" title="${t.shareLink}">
                  ${shareLinkIcon}
                </button>
                <button class="copy-btn" onclick="event.stopPropagation(); shareBank(${index}, this)" title="${t.share}">
                  ${copyIcon}
                </button>
              </div>
            </div>
            <div class="chevron ${isOpen ? 'rotate' : ''}" style="margin-left: 10px;">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </div>
          </div>
          <div class="accordion-content ${isOpen ? 'open' : ''}">
            <div class="bank-grid">
              <div class="label">A/C NAME <span>:</span></div><div class="value">${b.name}</div>
              <div class="label">A/C NO <span>:</span></div>
              <div class="value acc-highlight" id="acc-${index}">${isVisible ? displayHyphens(b.acc) : displayAcc}</div>
              <div class="label">BRANCH <span>:</span></div><div class="value">${b.branch}</div>
            </div>
            <button class="btn btn-toggle" id="toggle-acc-${index}" onclick="toggleAcc(${index}, '${b.acc}')">${btnText}</button>
            <button class="btn btn-secondary" onclick="copyAcc('${b.acc}')">${t.copyAcc}</button>
          </div>
        </div>
      `}).join('');

      // Cards (Data stays intact, just buttons translate)
      document.getElementById('cardList').innerHTML = myCards.map((c, index) => {
        const itemId = `item-card-${index}`;
        const isVisible = cardVisible[index];
        const btnText = isVisible ? t.hide : t.show;
        const displayCard = isVisible ? c.card : formatAccount(c.card);
        const isHighlighted = highlightedItemId === 'card-' + index;
        const isOpen = openAccordions.has(itemId) || isHighlighted;

        return `
        <div class="info-card ${isOpen ? 'highlighted-item is-open' : ''}" id="${itemId}">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <div class="card-header" style="margin-bottom: 0; flex: 1;">
              <span class="bank-header">
                <img src="${c.img}" alt="${c.bank}" class="card-icon">
                ${c.bank}
              </span>
              <div style="display: flex; gap: 4px;">
                <button class="copy-btn" onclick="event.stopPropagation(); shareSpecificLink('card', ${index}, this)" title="${t.shareLink}">
                  ${shareLinkIcon}
                </button>
                <button class="copy-btn" onclick="event.stopPropagation(); shareCard(${index}, this)" title="${t.share}">
                  ${copyIcon}
                </button>
              </div>
            </div>
            <div class="chevron ${isOpen ? 'rotate' : ''}" style="margin-left: 10px;">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </div>
          </div>
          <div class="accordion-content ${isOpen ? 'open' : ''}">
            <div class="bank-grid">
              <div class="label">CARD NO <span>:</span></div><div class="value acc-highlight" id="card-${index}">${isVisible ? displayHyphens(c.card) : displayCard}</div>
              <div class="label">TYPE <span>:</span></div><div class="value">${c.type}</div>
              <div class="label">NETWORK <span>:</span></div><div class="value">${c.network}</div>
            </div>
            <button class="btn btn-toggle" id="toggle-card-${index}" onclick="toggleCard(${index}, '${c.card}')">${btnText}</button>
            <button class="btn btn-secondary" onclick="copyAcc('${c.card}')">${t.copyCard}</button>
          </div>
        </div>
      `}).join('');

      // General Info
      document.getElementById('generalList').innerHTML = generalInfo.map((g, index) => {
        const itemId = `item-general-${index}`;
        const isOpen = openAccordions.has(itemId);
        return `
        <div class="info-card ${isOpen ? 'is-open' : ''}" id="${itemId}">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <div class="card-header" style="margin-bottom: 0; flex: 1;">
              <span class="bank-header">
                <img src="${g.img}" alt="${g[currentLang].type}" class="card-icon">
                ${g[currentLang].type}
              </span>
            </div>
            <div class="chevron ${isOpen ? 'rotate' : ''}" style="margin-left: 10px;">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </div>
          </div>
          <div class="accordion-content ${isOpen ? 'open' : ''}">
            <div style="color:#666; font-size:0.9rem; line-height:1.4; margin-bottom:15px; word-wrap:break-word; overflow-wrap:break-word;">${g[currentLang].value}</div>
            <a href="${g.action}" target="_blank" class="btn btn-secondary">${g[currentLang].label}</a>
          </div>
        </div>
      `}).join('');

      updateTime();
    }

    const datetime = document.getElementById('datetime');
    function updateTime() {
      const now = new Date();
      const year = now.getFullYear();

      if (currentLang === 'bn') {
        const weekday = now.toLocaleDateString('bn-BD', { weekday: 'long' });
        const day = now.toLocaleDateString('bn-BD', { day: 'numeric' });
        const month = now.toLocaleDateString('bn-BD', { month: 'long' });
        const yearBn = now.toLocaleDateString('bn-BD', { year: 'numeric' });

        const h = now.getHours();
        let period = "রাত";
        if (h >= 4 && h < 6) period = "ভোর";
        else if (h >= 6 && h < 12) period = "সকাল";
        else if (h >= 12 && h < 16) period = "দুপুর";
        else if (h >= 16 && h < 18) period = "বিকাল";
        else if (h >= 18 && h < 20) period = "সন্ধ্যা";
        else period = "রাত";

        const h12 = h % 12 || 12;
        const m = now.getMinutes().toString().padStart(2, '0');
        const s = now.getSeconds().toString().padStart(2, '0');

        // Convert english digits to bengali format
        const enToBn = { '0': '০', '1': '১', '2': '২', '3': '৩', '4': '৪', '5': '৫', '6': '৬', '7': '৭', '8': '৮', '9': '৯' };
        const toBn = numStr => String(numStr).split('').map(char => enToBn[char] || char).join('');

        const timeStr = `${toBn(h12)}:${toBn(m)}:${toBn(s)}`;

        datetime.innerHTML = `${weekday} - ${day} ${month} ${yearBn} - ${period} ${timeStr}<br>© ${yearBn} ${translations[currentLang].rights}`;
      } else {
        const weekday = now.toLocaleDateString('en-US', { weekday: 'long' });
        const day = now.toLocaleDateString('en-US', { day: 'numeric' });
        const month = now.toLocaleDateString('en-US', { month: 'long' });
        const yearEn = now.getFullYear();

        const h = now.getHours();
        const ampm = h >= 12 ? 'PM' : 'AM';
        const h12 = h % 12 || 12;
        const m = now.getMinutes().toString().padStart(2, '0');
        const s = now.getSeconds().toString().padStart(2, '0');
        const timeStr = `${h12}:${m}:${s} ${ampm}`;

        datetime.innerHTML = `${weekday} - ${day} ${month} ${yearEn} - ${timeStr}<br>© ${yearEn} ${translations[currentLang].rights}`;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      highlightedItemId = urlParams.get('item');
      const langParam = urlParams.get('lang');

      if (highlightedItemId) {
        // Delay adding the blur-active class slightly so that `scrollIntoView` 
        // works correctly, as overflow: hidden on body can block scrolling on some browsers
        setTimeout(() => {
          document.body.classList.add('blur-active');
        }, 500);
      }

      // Setup time updater
      setInterval(updateTime, 1000);

      // Re-center the highlighted item after orientation change / resize
      let resizeTimer;
      window.addEventListener('resize', () => {
        if (!highlightedItemId) return;
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          const target = document.getElementById('item-' + highlightedItemId);
          if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }, 200);
      });

      // If a language is encoded in the URL (from a shared Focus Mode link),
      // skip the language selection overlay and load directly in that language.
      if (highlightedItemId && langParam && translations[langParam]) {
        setLang(langParam);
      }
      // If no language chosen yet, wait for user
      // Elements are hidden by default via CSS container not having "show" class
    });

    function clearFocus() {
      highlightedItemId = null;
      document.body.classList.remove('blur-active');
      const clearBtn = document.getElementById('clearFocusBtn');
      if (clearBtn) {
        clearBtn.style.display = 'none';
        document.body.appendChild(clearBtn); // Move back to body to keep it available
      }

      document.querySelectorAll('.highlighted-item').forEach(el => {
        el.classList.remove('highlighted-item');
      });

      const url = new URL(window.location.href);
      url.searchParams.delete('item');
      window.history.replaceState({}, '', url);
    }

    function shareSpecificLink(type, index, btn) {
      const itemId = `${type}-${index}`;
      const url = new URL(window.location.href);
      url.searchParams.set('item', itemId);
      url.searchParams.set('lang', currentLang);

      navigator.clipboard.writeText(url.toString()).then(() => showToast(translations[currentLang].copied));

      if (btn) {
        const originalIcon = btn.innerHTML;
        btn.innerHTML = checkIcon;
        btn.style.color = "#2ecc71";
        setTimeout(() => {
          btn.innerHTML = originalIcon;
          btn.style.color = "";
        }, 2000);
      }
    }

    function copyAcc(text) {
      navigator.clipboard.writeText(text).then(() => showToast(translations[currentLang].copied));
    }

    function showToast(message) {
      const toast = document.createElement("div");
      toast.textContent = message;
      toast.style.position = "fixed";
      toast.style.bottom = "20px";
      toast.style.left = "50%";
      toast.style.transform = "translateX(-50%)";
      toast.style.background = "#2c3e50";
      toast.style.color = "#fff";
      toast.style.padding = "10px 20px";
      toast.style.borderRadius = "6px";
      toast.style.fontSize = "0.85rem";
      toast.style.boxShadow = "0 5px 15px rgba(0,0,0,0.2)";
      toast.style.zIndex = "9999";
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    const accVisible = {};
    function toggleAcc(index, fullAcc) {
      const elem = document.getElementById(`acc-${index}`);
      const btn = document.getElementById(`toggle-acc-${index}`);
      const t = translations[currentLang];
      if (accVisible[index]) {
        elem.textContent = formatAccount(fullAcc);
        btn.textContent = t.show;
        accVisible[index] = false;
      } else {
        elem.textContent = displayHyphens(fullAcc);
        btn.textContent = t.hide;
        accVisible[index] = true;
      }
    }

    const cardVisible = {};
    function toggleCard(index, fullCard) {
      const elem = document.getElementById(`card-${index}`);
      const btn = document.getElementById(`toggle-card-${index}`);
      const t = translations[currentLang];
      if (cardVisible[index]) {
        elem.textContent = formatAccount(fullCard);
        btn.textContent = t.show;
        cardVisible[index] = false;
      } else {
        elem.textContent = displayHyphens(fullCard);
        btn.textContent = t.hide;
        cardVisible[index] = true;
      }
    }

    function toggleAccordion(header) {
      const infoCard = header.closest('.info-card');

      // If we are in focus mode and this is the highlighted item, don't allow toggling
      if (document.body.classList.contains('blur-active') && infoCard.classList.contains('highlighted-item')) {
        return;
      }

      const content = header.nextElementSibling;
      const chevron = header.querySelector('.chevron');
      const isOpen = content.classList.contains('open');

      // Close all other accordions in the same list
      const list = header.closest('#bankList, #cardList, #generalList');
      if (list) {
        list.querySelectorAll('.info-card').forEach(card => {
          if (card !== infoCard) {
            openAccordions.delete(card.id);
            const cardContent = card.querySelector('.accordion-content');
            if (cardContent) cardContent.classList.remove('open');
            const cardChevron = card.querySelector('.chevron');
            if (cardChevron) cardChevron.classList.remove('rotate');
            card.classList.remove('is-open');
          }
        });
      }

      if (isOpen) {
        openAccordions.delete(infoCard.id);
      } else {
        openAccordions.add(infoCard.id);
      }

      content.classList.toggle('open');
      chevron.classList.toggle('rotate');
      infoCard.classList.toggle('is-open');
    }

    function shareBank(index, btn) {
      const b = myBanks[index];
      const text = `${b.bank}\nA/C NAME : ${b.name}\nA/C NO : ${b.acc}\nBRANCH : ${b.branch}`;
      copyAcc(text);
      if (btn) {
        const originalIcon = btn.innerHTML;
        btn.innerHTML = checkIcon;
        btn.style.color = "#2ecc71";
        setTimeout(() => {
          btn.innerHTML = originalIcon;
          btn.style.color = "";
        }, 2000);
      }
    }

    function shareCard(index, btn) {
      const c = myCards[index];
      const text = `${c.bank}\nCARD NO : ${c.card}\nTYPE : ${c.type}\nNETWORK : ${c.network}`;
      copyAcc(text);
      if (btn) {
        const originalIcon = btn.innerHTML;
        btn.innerHTML = checkIcon;
        btn.style.color = "#2ecc71";
        setTimeout(() => {
          btn.innerHTML = originalIcon;
          btn.style.color = "";
        }, 2000);
      }
    }
  </script>

</body>

</html>
